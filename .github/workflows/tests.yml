name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    - cron: "15 23 * * *"

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  api-tests:
    name: Run API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest -n auto -m api --alluredir=allure-results-api

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api
          retention-days: 7

      - name: Set up Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Allure
        if: always()
        run: |
          npm install -g allure@3.3.1

      - name: Generate Allure report
        if: always()
        run: |
          npx allure generate allure-results-api --output allure-report-api

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: allure-report-api
          retention-days: 7

  ui-tests:
    name: Run UI tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run UI tests
        run: |
          pytest -n 2 -m ui --alluredir=allure-results-ui

      - name: Upload UI debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-debug-artifacts
          path: artifacts/
          retention-days: 7

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results-ui
          retention-days: 7

      - name: Set up Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Allure
        if: always()
        run: |
          npm install -g allure@3.3.1

      - name: Generate Allure report
        if: always()
        run: |
          npx allure generate allure-results-ui --output allure-report-ui

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-ui
          path: allure-report-ui
          retention-days: 7

  deploy-pages:
    name: Publish Allure to GitHub Pages
    if: always() && github.event_name != 'pull_request'
    needs: [ api-tests, ui-tests ]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download API Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-api
          path: site/api

      - name: Download UI Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-ui
          path: site/ui

      - name: Create index page
        run: |
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Allure Reports</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              h1 { margin-bottom: 24px; }
              ul { line-height: 2; }
              a { font-size: 18px; text-decoration: none; }
            </style>
          </head>
          <body>
            <h1>Allure Reports</h1>
            <ul>
              <li><a href="./api/">API report</a></li>
              <li><a href="./ui/">UI report</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4