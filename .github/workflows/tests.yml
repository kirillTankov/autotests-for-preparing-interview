name: API Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest tests/api --alluredir=allure-results-api

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api
          retention-days: 7

      - name: Set up Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Allure 3
        if: always()
        run: |
          npm install -g allure@3.3.1

      - name: Check Allure 3 version
        if: always()
        run: |
          npx allure --version

      - name: Generate Allure 3 report
        if: always()
        run: |
          npx allure generate allure-results-api --output allure-report-api

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: allure-report-api
          retention-days: 7